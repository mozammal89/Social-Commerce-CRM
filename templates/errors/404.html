{% extends 'layouts/base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block body %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center error-container">
        <div class="error-icon mb-4">
            <i class="bi bi-emoji-frown text-secondary display-1"></i>
        </div>
        <h1 class="display-4 fw-bold mb-3">404</h1>
        <h2 class="h4 mb-4">Page Not Found</h2>
        <p class="lead mb-4 text-muted">
            The page you're looking for doesn't exist or has been moved to another location.
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="javascript:history.back()" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left me-2"></i>Go Back
            </a>
            <a href="{% url 'dashboard:home' %}" class="btn btn-primary">
                <i class="bi bi-house me-2"></i>Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
