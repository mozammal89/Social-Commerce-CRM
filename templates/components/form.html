<!-- Generic Form Component -->
<form method="post" enctype="multipart/form-data" {% if form.attrs %}{{ form_attrs }}{% endif %}>
    {% csrf_token %}
    {% if form.non_field_errors %}
    <div class="alert alert-danger">
        {% for error in form.non_field_errors %}
        {{ error }}{% if not forloop.last %}<br>{% endif %}
        {% endfor %}
    </div>
    {% endif %}
    
    <div class="row">
        {% for field in form %}
        <div class="col-12 col-md-6 col-lg-4">
            {% include 'components/form_field.html' %}
        </div>
        {% endfor %}
    </div>
    
    <div class="d-flex gap-2 justify-content-end mt-4">
        {% if cancel_url %}
        <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancel</a>
        {% endif %}
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-2"></i>{{ submit_text|default:"Save" }}
        </button>
    </div>
</form>
