<!-- {# ---------------------------------------------------------------------------
   Centralized confirmation & prompt modal.

   This partial is included once in templates/layouts/base.html, so every
   page in the app can call ``window.confirmAction({...})`` (and
   ``window.confirmAction.prompt({...})``) without having to ship its own
   modal markup.

   Usage:

       const ok = await window.confirmAction({
           title:        'Delete store?',
           message:      'Are you sure you want to delete "My Store"?',
           confirmText:  'Delete',
           confirmClass: 'btn-danger',
           cancelText:   'Cancel',                // optional
           warning:      '...',                  // optional yellow alert
       });
       if (ok) { /* user clicked Confirm */ }

       const reason = await window.confirmAction.prompt({
           title:        'Cancel subscription?',
           message:      'This action cannot be undone.',
           label:        'Why are you cancelling?',   // optional label
           placeholder:  'Your feedback helps us improve.',
           confirmText:  'Cancel subscription',
           confirmClass: 'btn-danger',
           cancelText:   'Keep subscription',
           multiline:    true,                  // false → <input>, true → <textarea>
           required:     false,                 // if true, empty input is rejected
       });
       if (reason !== null) { /* user confirmed; reason is the trimmed text */ }

   Return values:
     - ``confirmAction``       → ``Promise<boolean>`` (true = confirmed)
     - ``confirmAction.prompt``→ ``Promise<string|null>``
                                 (null = user dismissed without confirming,
                                  matches ``window.prompt`` semantics)

   The helper uses Bootstrap 5's ``bootstrap.Modal`` (loaded in base.html).
   It re-uses a single DOM node for every dialog so the document only ever
   has one confirm modal in it, regardless of how many times it's opened.
   --------------------------------------------------------------------------- #} -->
<div class="modal fade" id="appConfirmModal" tabindex="-1" aria-labelledby="appConfirmModalLabel" aria-hidden="true" aria-modal="true" role="dialog" data-app-confirm-modal>
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="appConfirmModalLabel">Confirm</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                {# Warning alert slot — hidden until ``options.warning`` is set. #}
                <div class="alert alert-warning small d-none" id="appConfirmModalWarning" role="alert"></div>
                {# Body container — replaced on each call so previous content (input/textarea/text) never leaks. #}
                <div id="appConfirmModalBody"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="appConfirmModalCancel" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="appConfirmModalConfirm">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    "use strict";

    /**
     * Read the CSRF token from the ``csrftoken`` cookie that Django sets
     * on every page that emits a ``{% csrf_token %}`` (the layouts/base
     * layout does this unconditionally via a hidden form, so the cookie
     * is always present on every page that extends the layout).
     *
     * Falls back to the value of the hidden ``csrfmiddlewaretoken``
     * input that ``{% csrf_token %}`` emits — useful in the rare case
     * the cookie was cleared (private mode, expired session, etc.) but
     * the form input is still in the DOM.
     *
     * Returns an empty string if neither is available; callers should
     * treat that as "this request will fail CSRF" rather than sending
     * a malformed header.
     */
    function getCsrfToken() {
        var match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]*)/);
        if (match && match[1]) {
            return decodeURIComponent(match[1]);
        }
        var input = document.querySelector("input[name=csrfmiddlewaretoken]");
        if (input && input.value) {
            return input.value;
        }
        return "";
    }
    // Expose globally so any page that needs it can use the same robust
    // lookup (cookie first, hidden input as fallback). Pages may
    // override this with their own helper if they have additional
    // sources (e.g. a meta tag) — the assignment is non-destructive.
    if (typeof window.getCsrfToken !== "function") {
        window.getCsrfToken = getCsrfToken;
    }

    /**
     * the body of the modal from the given options and show it.
     *
     * Returns a Promise that resolves to either:
     *   - ``true``/``false`` for confirmAction()
     *   - ``string|null`` for confirmAction.prompt()
     *
     * The caller is responsible for interpreting the resolved value.
     */
    function showDialog(options) {
        options = options || {};

        var modalEl = document.getElementById("appConfirmModal");
        if (!modalEl) {
            // Defensive fallback: if the partial isn't on the page, fall
            // back to the native browser dialog so the action still runs.
            if (options.isPrompt) {
                return Promise.resolve(window.prompt(options.message || options.title || ""));
            }
            return Promise.resolve(window.confirm(options.message || options.title || "Are you sure?"));
        }

        var titleEl = document.getElementById("appConfirmModalLabel");
        var warningEl = document.getElementById("appConfirmModalWarning");
        var bodyEl = document.getElementById("appConfirmModalBody");
        var cancelBtn = document.getElementById("appConfirmModalCancel");
        var oldConfirmBtn = document.getElementById("appConfirmModalConfirm");
        var bsModal = bootstrap.Modal.getOrCreateInstance(modalEl);

        // ----- Title -----
        if (options.title) {
            titleEl.textContent = options.title;
        }

        // ----- Warning slot -----
        if (options.warning) {
            warningEl.textContent = options.warning;
            warningEl.classList.remove("d-none");
        } else {
            warningEl.textContent = "";
            warningEl.classList.add("d-none");
        }

        // ----- Body (replace with a fresh node so previous inputs leak nothing) -----
        var newBody = document.createElement("div");
        newBody.id = "appConfirmModalBody";

        if (options.isPrompt) {
            var labelText = options.label || "";
            if (labelText) {
                var labelEl = document.createElement("label");
                labelEl.setAttribute("for", "appConfirmModalInput");
                labelEl.className = "form-label small text-muted mb-1";
                labelEl.textContent = labelText;
                newBody.appendChild(labelEl);
            }

            var inputEl;
            if (options.multiline) {
                inputEl = document.createElement("textarea");
                inputEl.rows = options.rows || 3;
            } else {
                inputEl = document.createElement("input");
                inputEl.type = options.inputType || "text";
            }
            inputEl.id = "appConfirmModalInput";
            inputEl.className = "form-control";
            if (options.placeholder) inputEl.placeholder = options.placeholder;
            if (options.required) inputEl.setAttribute("required", "required");
            newBody.appendChild(inputEl);

            // Inline error placeholder for required-field validation.
            var errorEl = document.createElement("div");
            errorEl.id = "appConfirmModalError";
            errorEl.className = "text-danger small mt-1 d-none";
            newBody.appendChild(errorEl);
        } else if (options.isAlert) {
            // Alert variant: optional message + structured items list.
            // Used for "you have over-cap usage" flows where the user
            // needs to see exactly which rows are blocking an action.
            if (options.message) {
                var msgEl = document.createElement("p");
                msgEl.className = "mb-3";
                msgEl.textContent = options.message;
                newBody.appendChild(msgEl);
            }
            if (options.items && options.items.length) {
                var listEl = document.createElement("ul");
                listEl.className = "list-unstyled mb-0";
                options.items.forEach(function (group) {
                    if (!group || !group.entries || !group.entries.length) return;
                    var groupEl = document.createElement("li");
                    groupEl.className = "mb-2";
                    var labelEl = document.createElement("div");
                    labelEl.className = "small text-muted mb-1 fw-semibold";
                    labelEl.textContent = group.label;
                    groupEl.appendChild(labelEl);
                    var ul = document.createElement("ul");
                    ul.className = "mb-0 ps-3";
                    group.entries.slice(0, 10).forEach(function (entry) {
                        var li = document.createElement("li");
                        li.className = "small";
                        // Use textContent to avoid XSS from server-side data.
                        li.textContent = entry.label || entry.email || entry.name || String(entry);
                        ul.appendChild(li);
                    });
                    if (group.entries.length > 10) {
                        var more = document.createElement("li");
                        more.className = "small text-muted";
                        more.textContent = "… and " + (group.entries.length - 10) + " more";
                        ul.appendChild(more);
                    }
                    groupEl.appendChild(ul);
                    listEl.appendChild(groupEl);
                });
                newBody.appendChild(listEl);
            }
        } else if (options.message) {
            var msgEl = document.createElement("p");
            msgEl.className = "mb-0";
            msgEl.textContent = options.message;
            newBody.appendChild(msgEl);
        }

        bodyEl.parentNode.replaceChild(newBody, bodyEl);

        // ----- Buttons -----
        cancelBtn.textContent = options.cancelText || "Cancel";
        oldConfirmBtn.textContent = options.confirmText || "Confirm";
        oldConfirmBtn.className = "btn " + (options.confirmClass || "btn-primary");

        // Alert variant: hide the cancel button (single dismiss action).
        if (options.isAlert) {
            cancelBtn.classList.add("d-none");
        } else {
            cancelBtn.classList.remove("d-none");
        }

        // Clone the confirm button to drop any stale click handler.
        var confirmBtn = oldConfirmBtn.cloneNode(true);
        oldConfirmBtn.parentNode.replaceChild(confirmBtn, oldConfirmBtn);

        // ----- Promise wiring -----
        return new Promise(function (resolve) {
            var settled = false;

            // ``onEnter`` must be declared in the same scope as
            // ``settle`` (the Promise executor) because ``settle``
            // removes the listener it adds — and it can't reach a
            // binding that's scoped inside an ``if (inputEl) { ... }``
            // block below. Declaring it here (and only attaching it
            // when ``inputEl`` exists) keeps the binding visible to
            // both functions without registering a listener for the
            // alert / confirm variants that don't have an input.
            function onEnter(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    onConfirm();
                }
            }

            function settle(value) {
                if (settled) return;
                settled = true;
                modalEl.removeEventListener("hidden.bs.modal", onHidden);
                modalEl.removeEventListener("shown.bs.modal", onShown);
                confirmBtn.removeEventListener("click", onConfirm);
                if (inputEl) {
                    inputEl.removeEventListener("keydown", onEnter);
                }
                resolve(value);
            }

            function onConfirm() {
                if (options.isPrompt && options.required) {
                    var value = inputEl.value || "";
                    if (!value.trim()) {
                        // Show inline error, keep modal open, refocus.
                        var errEl = document.getElementById("appConfirmModalError");
                        if (errEl) {
                            errEl.textContent = "This field is required.";
                            errEl.classList.remove("d-none");
                        }
                        if (inputEl) inputEl.focus();
                        return;
                    }
                }
                if (options.isPrompt) {
                    var v = inputEl ? (inputEl.value || "") : "";
                    settle(v);
                } else {
                    settle(true);
                }
                // ``onConfirm`` callback — invoked in addition to (and
                // before) the Promise resolution so legacy callers that
                // pass ``onConfirm`` (e.g. ``team-management.js``)
                // still execute their action. The Promise still
                // resolves so modern callers using ``.then()`` continue
                // to work.
                if (typeof options.onConfirm === "function") {
                    try {
                        options.onConfirm();
                    } catch (cbErr) {
                        console.error("[confirm_modal] onConfirm threw:", cbErr);
                    }
                }
                bsModal.hide();
            }

            function onHidden() {
                // Modal closed without a confirmed click → treat as dismissal.
                settle(options.isPrompt ? null : false);
            }

            confirmBtn.addEventListener("click", onConfirm);
            modalEl.addEventListener("hidden.bs.modal", onHidden);

            if (inputEl) {
                inputEl.addEventListener("keydown", onEnter);
            }

            // Defer focus until Bootstrap finishes its show animation.
            function onShown() {
                modalEl.removeEventListener("shown.bs.modal", onShown);
                if (inputEl) {
                    inputEl.focus();
                } else {
                    confirmBtn.focus();
                }
            }
            modalEl.addEventListener("shown.bs.modal", onShown);

            bsModal.show();
        });
    }

    // Expose on window so any page can call it.
    window.confirmAction = function (options) {
        options = options || {};
        options.isPrompt = false;
        options.isAlert = false;
        return showDialog(options);
    };
    window.confirmAction.prompt = function (options) {
        options = options || {};
        options.isPrompt = true;
        options.isAlert = false;
        return showDialog(options);
    };
    window.confirmAction.alert = function (options) {
        options = options || {};
        options.isPrompt = false;
        options.isAlert = true;
        // Resolves to ``true`` when the user dismisses — alerts are
        // single-action modals with no cancel path. Matches the
        // semantic of native ``window.alert``.
        return showDialog(options).then(function () { return true; });
    };
})();
</script>
