<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Commerce CRM</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        .api-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .api-links a {
            display: inline-block;
            margin: 5px 10px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .api-links a:hover {
            background: #764ba2;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ Social Commerce CRM</h1>
        <p>Production-ready Django SaaS foundation for Social Commerce CRM platform</p>
        
        <div class="status">
            ✅ Application is running successfully
        </div>
        
        <div class="api-links">
            <a href="/api/docs/">📚 API Documentation (Swagger)</a>
            <a href="/api/redoc/">📖 API Documentation (ReDoc)</a>
            <a href="/admin/">⚙️ Admin Panel</a>
            <a href="/api/v1/health/">❤️ Health Check</a>
        </div>
        
        <p style="margin-top: 30px; font-size: 14px; color: #999;">
            Django 5.x | Django REST Framework | PostgreSQL | Redis | Celery
        </p>
    </div>
</body>
</html>
